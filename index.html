<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexCall — Video Calling</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    /* ============================
       CSS VARIABLES & RESET
    ============================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:       #080c14;
      --bg-mid:        #0d1421;
      --bg-card:       rgba(255,255,255,0.04);
      --bg-glass:      rgba(255,255,255,0.06);
      --border:        rgba(255,255,255,0.08);
      --border-glow:   rgba(99,179,237,0.35);
      --accent:        #4fc3f7;
      --accent2:       #7c6fef;
      --accent-green:  #43e97b;
      --accent-red:    #f76e6e;
      --accent-yellow: #f7c948;
      --text-1:        #eef2ff;
      --text-2:        #8899bb;
      --text-3:        #556080;
      --shadow-card:   0 8px 32px rgba(0,0,0,0.45);
      --shadow-glow:   0 0 40px rgba(79,195,247,0.18);
      --radius-sm:     10px;
      --radius-md:     16px;
      --radius-lg:     24px;
      --radius-xl:     32px;
      --transition:    all 0.22s cubic-bezier(0.4,0,0.2,1);
    }

    html, body {
      height: 100%;
      background: var(--bg-deep);
      color: var(--text-1);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ============================
       ANIMATED BACKGROUND
    ============================ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(79,195,247,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(124,111,239,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 50% 50%, rgba(8,12,20,0) 0%, var(--bg-deep) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ============================
       UTILITY CLASSES
    ============================ */
    .hidden { display: none !important; }
    .sr-only { position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0); }

    /* ============================
       TYPOGRAPHY
    ============================ */
    h1, h2, h3, .heading { font-family: 'Syne', sans-serif; }
    h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; letter-spacing: -0.03em; }
    h2 { font-size: clamp(1.3rem, 3vw, 1.8rem); font-weight: 700; letter-spacing: -0.02em; }
    h3 { font-size: 1.1rem; font-weight: 600; }

    /* ============================
       LAYOUT WRAPPER
    ============================ */
    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ============================
       TOP NAV
    ============================ */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,20,0.7);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      color: var(--text-1);
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 6px 12px 6px 6px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
    }

    .user-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    /* ============================
       BUTTONS
    ============================ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      outline: none;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 20px rgba(79,195,247,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(79,195,247,0.4);
    }

    .btn-ghost {
      background: var(--bg-glass);
      color: var(--text-2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.09);
      color: var(--text-1);
      border-color: rgba(255,255,255,0.14);
    }

    .btn-danger {
      background: linear-gradient(135deg, #f76e6e, #d63030);
      color: #fff;
      box-shadow: 0 4px 16px rgba(247,110,110,0.3);
    }
    .btn-danger:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(247,110,110,0.45);
    }

    .btn-success {
      background: linear-gradient(135deg, var(--accent-green), #1a9e4a);
      color: #fff;
      box-shadow: 0 4px 16px rgba(67,233,123,0.25);
    }
    .btn-success:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(67,233,123,0.38);
    }

    .btn-icon {
      width: 46px; height: 46px;
      padding: 0;
      border-radius: 50%;
      font-size: 18px;
    }

    .btn-icon-sm {
      width: 36px; height: 36px;
      padding: 0;
      border-radius: 50%;
      font-size: 14px;
    }

    .btn-muted {
      background: rgba(247,110,110,0.15);
      color: var(--accent-red);
      border: 1px solid rgba(247,110,110,0.3);
    }
    .btn-muted:hover {
      background: rgba(247,110,110,0.25);
    }

    .btn-lg {
      padding: 13px 28px;
      font-size: 15px;
      border-radius: var(--radius-md);
    }

    .btn-full { width: 100%; }

    /* ============================
       CARD / GLASS PANELS
    ============================ */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(20px);
    }

    .card-glow {
      box-shadow: var(--shadow-card), var(--shadow-glow);
      border-color: rgba(79,195,247,0.15);
    }

    /* ============================
       FORM ELEMENTS
    ============================ */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-1);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: var(--transition);
    }

    input:focus {
      border-color: rgba(79,195,247,0.5);
      background: rgba(79,195,247,0.04);
      box-shadow: 0 0 0 3px rgba(79,195,247,0.1);
    }

    input::placeholder { color: var(--text-3); }

    .form-error {
      font-size: 12px;
      color: var(--accent-red);
      min-height: 16px;
    }

    /* ============================
       AUTH SCREEN
    ============================ */
    #auth-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .auth-header .logo-big {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin: 0 auto 18px;
      box-shadow: 0 8px 32px rgba(79,195,247,0.3);
    }

    .auth-header p {
      color: var(--text-2);
      margin-top: 6px;
      font-size: 15px;
    }

    .auth-card {
      padding: 32px;
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 28px;
    }

    .auth-tab {
      flex: 1;
      padding: 9px;
      background: transparent;
      border: none;
      border-radius: 7px;
      color: var(--text-3);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .auth-tab.active {
      background: rgba(255,255,255,0.09);
      color: var(--text-1);
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-3);
      font-size: 12px;
      margin: 4px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      background: rgba(255,255,255,0.06);
      color: var(--text-1);
      border: 1px solid var(--border);
      padding: 11px 20px;
    }
    .btn-google:hover {
      background: rgba(255,255,255,0.1);
    }

    .google-icon {
      width: 18px; height: 18px;
    }

    /* ============================
       LOBBY / HOME SCREEN
    ============================ */
    #lobby-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .lobby-container {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .lobby-hero {
      text-align: center;
      padding: 16px 0 8px;
    }

    .lobby-hero p {
      color: var(--text-2);
      margin-top: 10px;
      font-size: 16px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .status-online { background: rgba(67,233,123,0.12); color: var(--accent-green); border: 1px solid rgba(67,233,123,0.25); }
    .status-online .status-dot { background: var(--accent-green); }
    .status-connecting { background: rgba(247,201,72,0.12); color: var(--accent-yellow); border: 1px solid rgba(247,201,72,0.25); }
    .status-connecting .status-dot { background: var(--accent-yellow); }
    .status-connected { background: rgba(79,195,247,0.12); color: var(--accent); border: 1px solid rgba(79,195,247,0.25); }
    .status-connected .status-dot { background: var(--accent); }
    .status-ended { background: rgba(247,110,110,0.12); color: var(--accent-red); border: 1px solid rgba(247,110,110,0.25); }
    .status-ended .status-dot { background: var(--accent-red); animation: none; }

    .lobby-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .action-card {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
      transition: var(--transition);
    }

    .action-card:hover {
      border-color: rgba(255,255,255,0.14);
      transform: translateY(-2px);
      box-shadow: var(--shadow-card), 0 0 30px rgba(79,195,247,0.1);
    }

    .action-icon {
      width: 44px; height: 44px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .action-icon-create { background: linear-gradient(135deg, rgba(79,195,247,0.2), rgba(124,111,239,0.2)); }
    .action-icon-join   { background: linear-gradient(135deg, rgba(67,233,123,0.2), rgba(79,195,247,0.2)); }

    .action-card h3 { margin: 0; }

    .action-card p {
      font-size: 13px;
      color: var(--text-3);
      line-height: 1.5;
    }

    .room-id-display {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: rgba(79,195,247,0.06);
      border: 1px solid rgba(79,195,247,0.2);
      border-radius: var(--radius-sm);
    }

    .room-id-label {
      font-size: 11px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .room-id-value {
      flex: 1;
      font-family: 'Syne', monospace;
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.1em;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ============================
       JOIN MODAL
    ============================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .modal {
      width: 100%;
      max-width: 400px;
      padding: 28px;
      animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      transition: var(--transition);
    }

    .modal-close:hover { color: var(--text-1); }

    /* ============================
       CALL SCREEN
    ============================ */
    #call-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
    }

    .call-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .call-title { display: flex; align-items: center; gap: 12px; }

    .call-timer {
      font-family: 'Syne', monospace;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-2);
      padding: 4px 10px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    /* Video grid */
    .video-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      min-height: 0;
    }

    @media (min-width: 640px) {
      .video-grid { grid-template-columns: 1fr 1fr; }
    }

    .video-tile {
      position: relative;
      background: #0a1020;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border);
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }

    .video-label {
      position: absolute;
      bottom: 12px;
      left: 12px;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 10px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      color: #fff;
    }

    .video-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--text-3);
    }

    .video-placeholder .avatar-lg {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }

    .video-placeholder p { font-size: 14px; }

    .cam-off-indicator {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 8px;
      background: rgba(247,110,110,0.2);
      border: 1px solid rgba(247,110,110,0.35);
      border-radius: 6px;
      font-size: 11px;
      color: var(--accent-red);
      font-weight: 500;
    }

    /* Control bar */
    .call-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(20px);
      flex-wrap: wrap;
    }

    .control-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .control-btn span {
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 0.03em;
    }

    .ctrl {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      transition: var(--transition);
    }

    .ctrl:active { transform: scale(0.92); }

    .ctrl-default {
      background: rgba(255,255,255,0.08);
      color: var(--text-1);
      border: 1px solid var(--border);
    }
    .ctrl-default:hover {
      background: rgba(255,255,255,0.14);
    }

    .ctrl-muted-state {
      background: rgba(247,110,110,0.15);
      color: var(--accent-red);
      border: 1px solid rgba(247,110,110,0.3);
    }

    .ctrl-end {
      background: linear-gradient(135deg, #f76e6e, #d63030);
      color: #fff;
      box-shadow: 0 4px 16px rgba(247,110,110,0.35);
      width: 60px; height: 60px;
      font-size: 22px;
    }
    .ctrl-end:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 24px rgba(247,110,110,0.5);
    }

    /* ============================
       TOAST NOTIFICATIONS
    ============================ */
    #toast-container {
      position: fixed;
      top: 80px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      padding: 12px 16px;
      background: rgba(13,20,33,0.95);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 13px;
      color: var(--text-1);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: toastIn 0.3s cubic-bez
