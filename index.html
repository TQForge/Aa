<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA — AI Voice Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent:  #00d4ff;
    --accent2: #7b5fff;
    --danger:  #ff4d6d;
    --muted:   #3a5a7a;
    --glow:    0 0 18px rgba(0,212,255,.5);
    --mono:    'Share Tech Mono', monospace;
  }
  html, body { width:100%; height:100%; background:#050810; overflow:hidden; font-family:'Rajdhani',sans-serif; }
  #canvas-wrap { position:fixed; inset:0; }
  #canvas-wrap canvas { display:block; width:100%!important; height:100%!important; }
  #canvas-wrap::after {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:2;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.015) 2px,rgba(0,212,255,.015) 4px);
  }
  .hud-corner { position:absolute; width:32px; height:32px; border-color:var(--accent); border-style:solid; border-width:0; opacity:.6; z-index:10; pointer-events:none; }
  .hud-corner.tl { top:20px; left:20px; border-top-width:2px; border-left-width:2px; }
  .hud-corner.tr { top:20px; right:20px; border-top-width:2px; border-right-width:2px; }
  .hud-corner.bl { bottom:20px; left:20px; border-bottom-width:2px; border-left-width:2px; }
  .hud-corner.br { bottom:20px; right:20px; border-bottom-width:2px; border-right-width:2px; }
  #avatar-status {
    position:absolute; top:24px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:8px;
    font-family:var(--mono); font-size:11px; letter-spacing:.16em;
    color:var(--accent); z-index:10; pointer-events:none; text-transform:uppercase;
  }
  #status-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:var(--glow); animation:pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.3} }
  #emotion-bar { position:absolute; top:20px; right:60px; display:flex; gap:6px; z-index:10; }
  .emotion-chip {
    font-family:var(--mono); font-size:9px; letter-spacing:.08em;
    padding:3px 9px; border-radius:20px; border:1px solid var(--muted); color:var(--muted);
    background:rgba(5,8,16,.6); backdrop-filter:blur(6px); text-transform:uppercase; transition:all .3s;
  }
  .emotion-chip.active { border-color:var(--accent); color:var(--accent); box-shadow:var(--glow); background:rgba(0,212,255,.1); }
  #subtitle {
    position:absolute; bottom:160px; left:50%; transform:translateX(-50%);
    max-width:560px; width:90%; text-align:center;
    font-family:var(--mono); font-size:13px; letter-spacing:.04em;
    color:rgba(180,230,255,.85); line-height:1.65; z-index:10; pointer-events:none;
    text-shadow:0 0 14px rgba(0,212,255,.45); opacity:0; transition:opacity .4s;
  }
  #subtitle.visible { opacity:1; }
  #waveform {
    position:absolute; bottom:120px; left:50%; transform:translateX(-50%);
    display:flex; align-items:flex-end; gap:3px; height:36px; z-index:10; opacity:0; transition:opacity .4s;
  }
  #waveform.active { opacity:1; }
  .bar { width:3px; background:var(--danger); border-radius:2px; animation:bar-dance var(--d,.6s) ease-in-out infinite alternate; transform-origin:bottom; }
  @keyframes bar-dance { from{height:4px} to{height:var(--h,28px)} }
  #controls {
    position:absolute; bottom:36px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:16px; z-index:20;
  }
  #voice-row { display:flex; gap:8px; }
  .voice-btn {
    padding:5px 14px; font-family:var(--mono); font-size:10px; letter-spacing:.1em;
    background:rgba(5,8,16,.72); border:1px solid var(--muted); color:var(--muted);
    border-radius:20px; cursor:pointer; transition:all .25s; text-transform:uppercase; backdrop-filter:blur(6px);
  }
  .voice-btn:hover { border-color:var(--accent); color:var(--accent); }
  .voice-btn.selected { border-color:var(--accent); color:var(--accent); background:rgba(0,212,255,.1); box-shadow:var(--glow); }
  #mic-btn {
    width:72px; height:72px; border-radius:50%;
    background:rgba(5,8,16,.78); border:2px solid var(--accent);
    cursor:pointer; transition:all .3s; display:flex; align-items:center; justify-content:center;
    box-shadow:var(--glow); backdrop-filter:blur(8px); flex-shrink:0;
    -webkit-user-select:none; user-select:none; touch-action:none;
  }
  #mic-btn svg { width:28px; height:28px; fill:var(--accent); transition:fill .3s; }
  #mic-btn:hover { background:rgba(0,212,255,.15); transform:scale(1.06); }
  #mic-btn.listening { border-color:var(--danger); box-shadow:0 0 28px rgba(255,77,109,.7); animation:mic-pulse 1.1s ease-in-out infinite; }
  #mic-btn.listening svg { fill:var(--danger); }
  @keyframes mic-pulse { 0%,100%{box-shadow:0 0 22px rgba(255,77,109,.6)} 50%{box-shadow:0 0 46px rgba(255,77,109,.95),0 0 72px rgba(255,77,109,.3)} }
  #mic-hint {
    font-family:var(--mono); font-size:9px; letter-spacing:.1em; color:var(--muted);
    text-transform:uppercase; pointer-events:none;
  }
  /* API Key overlay */
  #api-overlay {
    position:fixed; inset:0; z-index:100; background:rgba(5,8,16,.94); backdrop-filter:blur(12px);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
  }
  #api-overlay h2 { font-family:var(--mono); color:var(--accent); font-size:20px; letter-spacing:.12em; text-shadow:var(--glow); }
  #api-overlay p { font-size:13px; color:var(--muted); letter-spacing:.04em; text-align:center; max-width:340px; line-height:1.6; }
  #api-key-input {
    width:320px; padding:12px 20px; border-radius:10px;
    background:rgba(12,18,33,.9); border:1px solid rgba(0,212,255,.3);
    color:#cde4f5; font-family:var(--mono); font-size:13px; outline:none; letter-spacing:.05em;
  }
  #api-key-input:focus { border-color:var(--accent); box-shadow:var(--glow); }
  #api-key-submit {
    padding:11px 32px; border-radius:10px; background:rgba(0,212,255,.15); border:1px solid var(--accent);
    color:var(--accent); font-family:var(--mono); font-size:12px; letter-spacing:.12em;
    cursor:pointer; transition:all .25s; text-transform:uppercase;
  }
  #api-key-submit:hover { background:rgba(0,212,255,.3); box-shadow:var(--glow); }
  #api-logo { font-family:var(--mono); font-size:42px; color:var(--accent); letter-spacing:.05em; text-shadow:0 0 30px rgba(0,212,255,.7); }
</style>
</head>
<body>

<!-- API Key Entry -->
<div id="api-overlay">
  <div id="api-logo">ARIA</div>
  <h2>SYSTEM INITIALIZATION</h2>
  <p>Enter your Google Gemini API key to activate the adaptive intelligence assistant.</p>
  <input id="api-key-input" type="password" placeholder="AIza…  your Gemini API key" />
  <button id="api-key-submit" onclick="initWithKey()">Initialize</button>
</div>

<!-- Full-screen 3D view -->
<div id="canvas-wrap">
  <div class="hud-corner tl"></div>
  <div class="hud-corner tr"></div>
  <div class="hud-corner bl"></div>
  <div class="hud-corner br"></div>

  <div id="avatar-status">
    <div id="status-dot"></div>
    <span id="status-text">IDLE</span>
  </div>

  <div id="emotion-bar">
    <div class="emotion-chip active" data-emotion="idle">Idle</div>
    <div class="emotion-chip" data-emotion="thinking">Think</div>
    <div class="emotion-chip" data-emotion="happy">Happy</div>
    <div class="emotion-chip" data-emotion="curious">Curious</div>
  </div>

  <div id="subtitle"></div>
  <div id="waveform"></div>

  <div id="controls">
    <div id="voice-row">
      <button class="voice-btn selected" data-voice="female" onclick="selectVoice(this)">Female</button>
      <button class="voice-btn" data-voice="male" onclick="selectVoice(this)">Male</button>
      <button class="voice-btn" data-voice="robotic" onclick="selectVoice(this)">Robotic</button>
    </div>
    <button id="mic-btn" id="mic-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1a4 4 0 014 4v6a4 4 0 01-8 0V5a4 4 0 014-4zm0 2a2 2 0 00-2 2v6a2 2 0 004 0V5a2 2 0 00-2-2zm7 8a1 1 0 010 2 7 7 0 01-14 0 1 1 0 012 0 5 5 0 0010 0 1 1 0 012 0zm-7 9a1 1 0 01.993.883L13 21v1a1 1 0 01-2 0v-1a1 1 0 011-1z"/>
      </svg>
    </button>
    <div id="mic-hint">HOLD TO SPEAK</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── STATE ──
const State = {
  apiKey:'', emotion:'idle', voiceProfile:'female',
  conversation:[], isSpeaking:false, isListening:false, lipSyncLevel:0
};

// ── THREE.JS SCENE SETUP ──
const wrap = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.setClearColor(0x050810, 1);
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.55, 4.8);
camera.lookAt(0, 1.3, 0);

// Resize handler - must run immediately and on resize
function onResize() {
  const w = wrap.clientWidth || window.innerWidth;
  const h = wrap.clientHeight || window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
// Run immediately, then observe
onResize();
window.addEventListener('resize', onResize);
new ResizeObserver(onResize).observe(wrap);

// ── SCENE ──
scene.fog = new THREE.FogExp2(0x050810, 0.055);
scene.add(new THREE.AmbientLight(0x0a1628, 3.0));

const keyLight = new THREE.PointLight(0x00d4ff, 3.5, 16);
keyLight.position.set(-2.5, 5, 2.5); keyLight.castShadow = true; scene.add(keyLight);
const fillLight = new THREE.PointLight(0x7b5fff, 2.5, 14);
fillLight.position.set(2.5, 2, 2); scene.add(fillLight);
const backL = new THREE.PointLight(0x00d4ff, 1.6, 12);
backL.position.set(0, 4, -4); scene.add(backL);
const underL = new THREE.PointLight(0x7b5fff, 1.2, 10);
underL.position.set(0, -0.4, 1.5); scene.add(underL);

// Grid floor
const grid = new THREE.GridHelper(30, 32, 0x0c2a4a, 0x0b1c30);
grid.position.y = -0.5; scene.add(grid);

// Particles
const pGeo = new THREE.BufferGeometry();
const pArr = new Float32Array(350 * 3);
for (let i = 0; i < pArr.length; i++) pArr[i] = (Math.random() - .5) * 22;
pGeo.setAttribute('position', new THREE.BufferAttribute(pArr, 3));
scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({ color:0x00d4ff, size:.055, transparent:true, opacity:.3 })));

// Rings
function makeRing(r, color, y, op=.16) {
  const m = new THREE.Mesh(new THREE.TorusGeometry(r, .013, 8, 90),
    new THREE.MeshBasicMaterial({ color, transparent:true, opacity:op }));
  m.rotation.x = Math.PI/2; m.position.y = y; scene.add(m); return m;
}
const rings = [makeRing(3.6, 0x00d4ff, -.35), makeRing(2.8, 0x7b5fff, -.35, .1), makeRing(4.5, 0x00d4ff, -.35, .07)];

// Holographic beam
const beamMat = new THREE.MeshBasicMaterial({ color:0x00d4ff, transparent:true, opacity:.06, side:THREE.DoubleSide });
const beam = new THREE.Mesh(new THREE.CylinderGeometry(.04, .6, 3, 16, 1, true), beamMat);
beam.position.set(0, -.35, 0); scene.add(beam);

// ── MATERIALS ──
function mat(color, emissive=0, ei=0, roughness=.35, metalness=.75) {
  return new THREE.MeshStandardMaterial({ color, emissive, emissiveIntensity:ei, roughness, metalness });
}
const bodyMat  = mat(0x0d1e3a, 0x00d4ff, .09, .28, .88);
const headMat  = mat(0x0f2240, 0x00d4ff, .11, .22, .92);
const glowMat  = mat(0x00d4ff, 0x00d4ff, 1.4, .08, .05);
const accentMat= mat(0x7b5fff, 0x7b5fff, 1.1, .2, .6);
const eyeMat   = mat(0x00d4ff, 0x00d4ff, 2.5, .05, .0);
const haloMat  = new THREE.MeshBasicMaterial({ color:0x00d4ff, transparent:true, opacity:.22, side:THREE.DoubleSide });

function addMesh(geo, material, parent, pos=[0,0,0], rot=[0,0,0]) {
  const m = new THREE.Mesh(geo, material);
  m.position.set(...pos); m.rotation.set(...rot); m.castShadow = true;
  parent.add(m); return m;
}

// ── AVATAR GROUP ──
const avatarGroup = new THREE.Group();
avatarGroup.position.y = -.5;
scene.add(avatarGroup);

// HEAD
const headGroup = new THREE.Group();
headGroup.position.set(0, 2.28, 0);
avatarGroup.add(headGroup);
addMesh(new THREE.SphereGeometry(.38, 32, 32), headMat, headGroup);

// Visor
const visor = new THREE.Mesh(
  new THREE.SphereGeometry(.395, 32, 16, 0, Math.PI*2, 0, Math.PI*.46),
  new THREE.MeshStandardMaterial({ color:0x001830, emissive:0x002244, emissiveIntensity:.35, roughness:.04, metalness:.97, transparent:true, opacity:.72 })
);
visor.rotation.z = Math.PI; headGroup.add(visor);

// Eyes
const eyeL = addMesh(new THREE.SphereGeometry(.056, 16, 16), eyeMat, headGroup, [-.13, .06, .33]);
const eyeR = addMesh(new THREE.SphereGeometry(.056, 16, 16), eyeMat, headGroup, [ .13, .06, .33]);

// Eye halos
[-.13, .13].forEach(x => {
  const h = new THREE.Mesh(new THREE.TorusGeometry(.075, .008, 8, 24), haloMat);
  h.position.set(x, .06, .33); headGroup.add(h);
});

// Eyelids
const lidMat = new THREE.MeshStandardMaterial({ color:0x0d1e3a, roughness:.3, metalness:.8 });
const lidL = new THREE.Mesh(new THREE.SphereGeometry(.06, 16, 8, 0, Math.PI*2, 0, Math.PI/2), lidMat);
lidL.position.set(-.13, .06, .33); lidL.rotation.x = Math.PI; lidL.scale.y = 0; headGroup.add(lidL);
const lidR = new THREE.Mesh(new THREE.SphereGeometry(.06, 16, 8, 0, Math.PI*2, 0, Math.PI/2), lidMat);
lidR.position.set(.13, .06, .33); lidR.rotation.x = Math.PI; lidR.scale.y = 0; headGroup.add(lidR);

// Mouth
const mouthGroup = new THREE.Group();
mouthGroup.position.set(0, -.1, .37); headGroup.add(mouthGroup);
addMesh(new THREE.BoxGeometry(.18, .024, .01), new THREE.MeshBasicMaterial({ color:0x000810 }), mouthGroup);
const mouthSegs = [];
for (let i = 0; i < 5; i++) {
  const s = addMesh(new THREE.BoxGeometry(.024, .018, .013),
    new THREE.MeshStandardMaterial({ color:0x00d4ff, emissive:0x00d4ff, emissiveIntensity:1.6, roughness:.1 }),
    mouthGroup, [-.048 + i*.024, 0, .006]);
  mouthSegs.push(s);
}

// Forehead lines
for (let i = 0; i < 3; i++) {
  const l = new THREE.Mesh(new THREE.BoxGeometry(.44-i*.07, .007, .01),
    new THREE.MeshStandardMaterial({ color:0x00d4ff, emissive:0x00d4ff, emissiveIntensity:.65 }));
  l.position.set(0, .16+i*.09, .33); headGroup.add(l);
}

// Antennas
[[-.21, .22], [.21, .3]].forEach(([x, h]) => {
  const g = new THREE.Group(); g.position.set(x, .34, 0); headGroup.add(g);
  addMesh(new THREE.CylinderGeometry(.01, .01, h, 8), bodyMat, g, [0, h/2, 0]);
  addMesh(new THREE.SphereGeometry(.026, 10, 10), glowMat, g, [0, h, 0]);
});

// NECK
addMesh(new THREE.CylinderGeometry(.1, .13, .22, 16), bodyMat, avatarGroup, [0, 2.05, 0]);

// TORSO
const torsoGroup = new THREE.Group();
torsoGroup.position.set(0, 1.35, 0); avatarGroup.add(torsoGroup);
addMesh(new THREE.BoxGeometry(.74, .82, .39), bodyMat, torsoGroup);
addMesh(new THREE.BoxGeometry(.4, .34, .04), mat(0x07162c, 0x00d4ff, .14, .2, .92), torsoGroup, [0, .06, .2]);
const coreOrb = addMesh(new THREE.SphereGeometry(.09, 20, 20), glowMat, torsoGroup, [0, .04, .22]);
addMesh(new THREE.TorusGeometry(.12, .013, 8, 30), accentMat, torsoGroup, [0, .04, .22]);
[-.28, .28].forEach(x => addMesh(new THREE.BoxGeometry(.015, .5, .04),
  new THREE.MeshStandardMaterial({ color:0x00d4ff, emissive:0x00d4ff, emissiveIntensity:.5 }),
  torsoGroup, [x, 0, .21]));

// Shoulders
[-.47, .47].forEach(x => addMesh(new THREE.SphereGeometry(.17, 16, 12),
  mat(0x0e2040, 0x00d4ff, .07, .25, .9), avatarGroup, [x, 1.75, 0]));

// Arms
function addArm(x, sx) {
  const g = new THREE.Group(); g.position.set(x, 1.55, 0); avatarGroup.add(g);
  addMesh(new THREE.CylinderGeometry(.09, .07, .43, 12), bodyMat, g, [0, -.215, 0]);
  addMesh(new THREE.SphereGeometry(.075, 12, 12), mat(0x0a1a30, 0x7b5fff, .24), g, [0, -.44, 0]);
  addMesh(new THREE.CylinderGeometry(.065, .055, .38, 12), bodyMat, g, [0, -.65, 0]);
  addMesh(new THREE.BoxGeometry(.02, .2, .075), accentMat, g, [sx*.075, -.63, 0]);
  addMesh(new THREE.SphereGeometry(.072, 12, 10), headMat, g, [0, -.87, 0]);
  return g;
}
const armL = addArm(-.57, -1), armR = addArm(.57, 1);

// Hips
addMesh(new THREE.BoxGeometry(.64, .19, .35), mat(0x0a1828, 0x7b5fff, .06), avatarGroup, [0, .97, 0]);

// Legs
function addLeg(x) {
  const g = new THREE.Group(); g.position.set(x, .9, 0); avatarGroup.add(g);
  addMesh(new THREE.CylinderGeometry(.11, .09, .43, 12), bodyMat, g, [0, -.215, 0]);
  addMesh(new THREE.SphereGeometry(.09, 12, 12), mat(0x0a1828, 0x00d4ff, .08), g, [0, -.44, 0]);
  addMesh(new THREE.CylinderGeometry(.08, .07, .38, 12), bodyMat, g, [0, -.65, 0]);
  addMesh(new THREE.BoxGeometry(.14, .1, .22), bodyMat, g, [0, -.88, .04]);
}
addLeg(-.2); addLeg(.2);

// ── ANIMATION LOOP ──
let blinkTimer=0, blinkInterval=3.5+Math.random()*2, blinkState=0;
let breathT=0, armT=0, headCX=0, headCY=0;
const lipH=[0,0,0,0,0]; let lipPtr=0;
function lerp(a, b, t) { return a + (b-a)*t; }

function setEmotion(n) {
  State.emotion = n;
  const chip = ['idle','thinking','happy','curious'].includes(n) ? n : 'idle';
  document.querySelectorAll('.emotion-chip').forEach(c => c.classList.toggle('active', c.dataset.emotion===chip));
}
function updateColors(em) {
  const ec = em==='thinking'?0x7b5fff : em==='happy'?0x00ff88 : em==='listening'?0xff4d6d : 0x00d4ff;
  eyeMat.emissive.setHex(ec); eyeMat.color.setHex(ec);
  haloMat.color.setHex(ec);
  keyLight.color.setHex(em==='thinking'?0x7b5fff : em==='happy'?0x00ff88 : 0x00d4ff);
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta(), t = clock.getElapsedTime(), em = State.emotion;

  // Breathing
  breathT += dt;
  const br = Math.sin(breathT * .9) * .013;
  torsoGroup.scale.y = 1 + br*.5; torsoGroup.position.y = 1.35 + br;
  headGroup.position.y = 2.28 + br*1.6;

  // Arm sway
  armT += dt * .5;
  armL.rotation.z =  .09 + Math.sin(armT) * .045;
  armR.rotation.z = -.09 - Math.sin(armT) * .045;

  // Head motion by emotion
  let hx=0, hy=0, hz=0;
  if (em==='listening')      { hx=Math.sin(t*1.1)*.09; hy=Math.sin(t*.7)*.07; hz=.13+Math.sin(t*.9)*.03; }
  else if (em==='thinking')  { hx=.11+Math.sin(t*.5)*.04; hy=.16; hz=-.09; }
  else if (em==='speaking')  { hx=Math.sin(t*2.2)*.05; hy=Math.sin(t*1.1)*.04; }
  else if (em==='happy')     { hx=Math.sin(t*2)*.07; hz=Math.sin(t*1.5)*.06; }
  else                       { hx=Math.sin(t*.4)*.04; hy=Math.sin(t*.3)*.03; }
  headCX = lerp(headCX, hx, .05); headCY = lerp(headCY, hy, .05);
  headGroup.rotation.x = headCX; headGroup.rotation.y = headCY;
  headGroup.rotation.z = lerp(headGroup.rotation.z, hz, .04);

  // Blinking
  blinkTimer += dt;
  if (blinkTimer >= blinkInterval && blinkState===0) { blinkState=1; blinkTimer=0; blinkInterval=2.5+Math.random()*3.5; }
  if (blinkState===1) { lidL.scale.y=Math.min(lidL.scale.y+dt*14,1); lidR.scale.y=Math.min(lidR.scale.y+dt*14,1); if(lidL.scale.y>=1)blinkState=2; }
  else if (blinkState===2) { blinkTimer+=dt; if(blinkTimer>.07)blinkState=3; }
  else if (blinkState===3) { lidL.scale.y=Math.max(lidL.scale.y-dt*12,0); lidR.scale.y=Math.max(lidR.scale.y-dt*12,0); if(lidL.scale.y<=0){blinkState=0;blinkTimer=0;} }

  // Lip sync
  lipH[lipPtr%5] = State.lipSyncLevel; lipPtr++;
  const avg = lipH.reduce((a,b)=>a+b,0)/5;
  mouthSegs.forEach((s,i)=>{
    const w = em==='speaking' ? Math.sin(t*14+i*.9)*avg*.7+avg*.3 : 0;
    s.scale.y = .2+w*1.6; s.material.emissiveIntensity = 1+w*2;
  });

  // Core orb pulse
  const cs = 1 + Math.sin(t*2)*.09 + (em==='speaking'?avg*.35:0);
  coreOrb.scale.setScalar(cs);
  glowMat.emissiveIntensity = 1.1 + Math.sin(t*2)*.4 + (em==='speaking'?avg*.9:0);
  rings.forEach((r,i) => r.rotation.z += dt*(0.09+i*.04)*(i%2?-1:1));
  beamMat.opacity = .04 + Math.sin(t*1.5)*.03 + (em==='speaking'?avg*.08:0);
  for (let i=1; i<pArr.length; i+=3) pArr[i] += Math.sin(t*.3+i)*.009;
  pGeo.attributes.position.needsUpdate = true;
  keyLight.intensity = 2.5 + Math.sin(t*3.1)*.18;

  renderer.render(scene, camera);
}
animate();

// ── SPEECH RECOGNITION ──
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null, finalTranscript = '';

if (SR) {
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const tx = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalTranscript += tx + ' ';
      else interim += tx;
    }
    showSubtitle((finalTranscript + interim).trim(), true);
  };
  recognition.onerror = e => {
    console.warn('SR error:', e.error);
    if (e.error === 'not-allowed') {
      showSubtitle('Microphone permission denied.');
    }
    stopListening();
  };
  recognition.onend = () => {
    // Only process if we were still in listening state (not stopped manually)
    if (State.isListening) {
      State.isListening = false;
      document.getElementById('mic-btn').classList.remove('listening');
      document.getElementById('waveform').classList.remove('active');
      animateWave(false);
      const txt = finalTranscript.trim();
      if (txt) processQuery(txt);
      else { setEmotion('idle'); updateColors('idle'); document.getElementById('status-text').textContent='IDLE'; clearSubtitle(); }
    }
  };
}

// Mic button — press and hold
const micBtn = document.getElementById('mic-btn');

function startListening() {
  if (!recognition) { alert('Speech recognition not supported in this browser.'); return; }
  if (State.isSpeaking || State.isListening) return;
  // Cancel any ongoing speech
  window.speechSynthesis && window.speechSynthesis.cancel();
  finalTranscript = '';
  State.isListening = true;
  try { recognition.start(); } catch(e) { console.warn('SR start error', e); }
  micBtn.classList.add('listening');
  document.getElementById('waveform').classList.add('active');
  document.getElementById('status-text').textContent = 'LISTENING';
  setEmotion('listening'); updateColors('listening'); animateWave(true); clearSubtitle();
}

function stopListening() {
  if (!recognition || !State.isListening) return;
  State.isListening = false;
  try { recognition.stop(); } catch(e) {}
  micBtn.classList.remove('listening');
  document.getElementById('waveform').classList.remove('active');
  animateWave(false);
  const txt = finalTranscript.trim();
  if (txt) processQuery(txt);
  else { setEmotion('idle'); updateColors('idle'); document.getElementById('status-text').textContent='IDLE'; clearSubtitle(); }
}

// Mouse events
micBtn.addEventListener('mousedown', e => { e.preventDefault(); startListening(); });
micBtn.addEventListener('mouseup',   e => { e.preventDefault(); stopListening(); });
micBtn.addEventListener('mouseleave',e => { if(State.isListening) stopListening(); });

// Touch events
micBtn.addEventListener('touchstart', e => { e.preventDefault(); startListening(); }, { passive:false });
micBtn.addEventListener('touchend',   e => { e.preventDefault(); stopListening(); },  { passive:false });

function animateWave(on) {
  const wf = document.getElementById('waveform'); wf.innerHTML = '';
  if (!on) return;
  [10,18,26,22,30,20,14,28,16,24,12,20].forEach((h, i) => {
    const b = document.createElement('div'); b.className = 'bar';
    b.style.setProperty('--h', h+'px');
    b.style.setProperty('--d', (.45+[0,.1,.05,.15,.08,.2,.03,.18,.07,.12,.04,.16][i])+'s');
    wf.appendChild(b);
  });
}

// ── API KEY ──
function initWithKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { alert('Please enter a valid Gemini API key.'); return; }
  State.apiKey = key;
  document.getElementById('api-overlay').style.display = 'none';
  // Pre-load voices
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
  }
  setTimeout(() => {
    const w = "Hello! I'm ARIA, your adaptive intelligence assistant. Hold the mic button and speak to me. How can I help you today?";
    showSubtitle(w); speak(w);
  }, 800);
}

// ── GEMINI API ──
async function processQuery(userText) {
  setEmotion('thinking'); updateColors('thinking');
  document.getElementById('status-text').textContent = 'PROCESSING';
  showSubtitle('…thinking…');

  const history = State.conversation.map(m => ({
    role: m.role==='assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));
  history.push({ role:'user', parts:[{ text:userText }] });
  State.conversation.push({ role:'user', content:userText });

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${State.apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({
          system_instruction: { parts:[{ text:`You are ARIA (Adaptive Reasoning Intelligence Assistant), a friendly AI in a futuristic holographic avatar.
Keep replies warm, concise (2-4 sentences), natural for text-to-speech.
No markdown, no bullet points. Speak conversationally as if face-to-face.` }] },
          contents: history,
          generationConfig: { maxOutputTokens:300, temperature:.9 }
        })
      }
    );
    const data = await res.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "I couldn't process that. Please try again.";
    State.conversation.push({ role:'assistant', content:reply });
    if (/\!|great|excellent|wonderful|love|happy|amazing/i.test(reply)) setEmotion('happy');
    else if (/hmm|interesting|curious|wonder|perhaps/i.test(reply)) setEmotion('curious');
    else setEmotion('speaking');
    showSubtitle(reply); speak(reply);
  } catch (err) {
    console.error('Gemini error:', err);
    const e2 = "I'm having trouble connecting. Please check your API key.";
    showSubtitle(e2); speak(e2);
    setEmotion('idle'); updateColors('idle');
    document.getElementById('status-text').textContent = 'IDLE';
  }
}

// ── TTS + LIP SYNC ──
let lipInt = null;

function getVoice(profile) {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return null;
  if (profile === 'male')   return voices.find(v => /(male|david|daniel|james|mark)/i.test(v.name)) || null;
  if (profile === 'female') return voices.find(v => /(female|samantha|victoria|karen|zira|susan)/i.test(v.name)) || null;
  return null; // robotic = default voice with pitch adjustment
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  const doSpeak = () => {
    const utt = new SpeechSynthesisUtterance(text);
    const p = State.voiceProfile;
    const v = getVoice(p);
    if (v) utt.voice = v;
    if (p === 'male')    { utt.pitch = .82; utt.rate = .94; }
    else if (p === 'robotic') { utt.pitch = .48; utt.rate = .85; }
    else                 { utt.pitch = 1.15; utt.rate = 1.0; }
    utt.volume = 1;

    const syl = text.replace(/[^aeiouAEIOU]/g,'0').replace(/[aeiouAEIOU]/g,'1').split('');

    utt.onstart = () => {
      State.isSpeaking = true; setEmotion('speaking'); updateColors('speaking');
      document.getElementById('status-text').textContent = 'SPEAKING';
      let ci = 0;
      lipInt = setInterval(() => {
        if (ci >= syl.length) { State.lipSyncLevel = 0; return; }
        State.lipSyncLevel = syl[ci]==='1' ? .6+Math.random()*.4 : Math.random()*.22;
        ci++;
      }, 78);
    };

    const onDone = () => {
      clearInterval(lipInt); State.lipSyncLevel = 0; State.isSpeaking = false;
      setEmotion('idle'); updateColors('idle');
      document.getElementById('status-text').textContent = 'IDLE';
      setTimeout(clearSubtitle, 2200);
    };
    utt.onend = onDone;
    utt.onerror = onDone;
    window.speechSynthesis.speak(utt);
  };

  // Ensure voices are loaded before speaking
  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) {
    doSpeak();
  } else {
    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.onvoiceschanged = null;
      doSpeak();
    };
  }
}

// ── SUBTITLE ──
function showSubtitle(text, dim=false) {
  const el = document.getElementById('subtitle');
  el.textContent = text; el.classList.add('visible'); el.style.opacity = dim ? '.5' : '';
}
function clearSubtitle() {
  const el = document.getElementById('subtitle');
  el.classList.remove('visible'); setTimeout(() => { el.textContent=''; }, 400);
}

// ── VOICE SELECTOR ──
function selectVoice(btn) {
  document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected'); State.voiceProfile = btn.dataset.voice;
}
